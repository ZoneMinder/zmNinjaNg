name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'zmNinjaNg-*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Sync version from package.json
        run: node scripts/sync-version.js

      - name: Build Electron app (Windows, unsigned)
        working-directory: ./app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm run build
          npx electron-builder --config electron-builder.json

      - name: Rename Windows Electron artifact
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#zmNinjaNg-}"
          mkdir -p dist/windows
          for f in desktop_release_builds/electron/*.exe; do
            [ -f "$f" ] && cp "$f" "dist/windows/zmNinjaNg-${VERSION}-windows-x64-setup.exe"
          done

      - name: Upload Windows Electron artifact
        uses: actions/upload-artifact@v4
        with:
          name: zmNinjaNg-windows-electron-${{ github.event.inputs.version || github.ref_name }}
          path: dist/windows/*.exe
          retention-days: 30

      - name: Upload Electron to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/zmNinjaNg-')
        with:
          files: |
            dist/windows/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
