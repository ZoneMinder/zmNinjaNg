name: Build Linux AMD64 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'zmNinjaNg-*'

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Sync version from package.json
        run: node scripts/sync-version.js

      - name: Build Electron app (Linux amd64, unsigned)
        working-directory: ./app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm run build
          npx electron-builder --config electron-builder.json

      - name: Rename Linux AMD64 Electron artifacts
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#zmNinjaNg-}"
          mkdir -p dist/linux-amd64
          for f in desktop_release_builds/electron/*.AppImage; do [ -f "$f" ] && cp "$f" "dist/linux-amd64/zmNinjaNg-${VERSION}-linux-amd64.AppImage"; done
          for f in desktop_release_builds/electron/*.deb; do [ -f "$f" ] && cp "$f" "dist/linux-amd64/zmNinjaNg-${VERSION}-linux-amd64.deb"; done
          for f in desktop_release_builds/electron/*.rpm; do [ -f "$f" ] && cp "$f" "dist/linux-amd64/zmNinjaNg-${VERSION}-linux-amd64.rpm"; done

      - name: Upload Linux AMD64 Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zmNinjaNg-linux-amd64-electron-${{ github.event.inputs.version || github.ref_name }}
          path: |
            dist/linux-amd64/*.AppImage
            dist/linux-amd64/*.deb
            dist/linux-amd64/*.rpm
          retention-days: 30

      - name: Upload Electron to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/zmNinjaNg-')
        with:
          files: |
            dist/linux-amd64/*.AppImage
            dist/linux-amd64/*.deb
            dist/linux-amd64/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
